spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:dummy@gmail.com}
    password: ${MAIL_PASSWORD:dummypassword}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  autoconfigure:
    exclude: >
      org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,
      org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

server:
  port: 10000

jwt:
  secret: ${JWT_SECRET:mediconnectSuperSecretKeyForJWTSigning2024MustBe256BitsLong!!}
  expiration: 86400000
  refresh-expiration: 604800000

razorpay:
  key-id: ${RAZORPAY_KEY:dummy}
  key-secret: ${RAZORPAY_SECRET:dummy}

anthropic:
  api:
    key: ${ANTHROPIC_KEY:dummy}

logging:
  level:
    com.mediconnect: INFO