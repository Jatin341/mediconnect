spring:
  application:
    name: mediconnect

  datasource:
    url: jdbc:postgresql://localhost:5432/mediconnect_db
    username: postgres
    password: ${DB_PASSWORD:1256}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:dummy@gmail.com}
    password: ${MAIL_PASSWORD:dummypassword}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:mediconnectSuperSecretKeyForJWTSigning2024MustBe256BitsLong!!}
  expiration: 86400000
  refresh-expiration: 604800000

razorpay:
  key-id: ${RAZORPAY_KEY:your_razorpay_key}
  key-secret: ${RAZORPAY_SECRET:your_razorpay_secret}

anthropic:
  api:
    key: ${ANTHROPIC_KEY:your_claude_api_key}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.mediconnect

logging:
  level:
    com.mediconnect: DEBUG